<!DOCTYPE html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Baseline meta (homepage / SPA fallback). Per-route values are injected by
         SEOHead and baked in at pre-render. Domain is centralized in config/brand.ts
         (→ SITE) — these absolute URLs are placeholders the pre-render overwrites. -->
    <title>Expedientes de Materialidad Fiscal listos para auditoría | FEI Consultores</title>
    <meta name="description" content="Construimos, organizamos y validamos los expedientes de materialidad fiscal que sustentan tus operaciones ante revisiones fiscales. +50 documentos estructurados por operación." />
    <link rel="canonical" href="https://feiconsultores.com/" />

    <!-- Crawl + local (GEO) signals -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#4CC9F0" />
    <meta name="geo.region" content="MX-NLE" />
    <meta name="geo.placename" content="Monterrey" />
    <meta name="ICBM" content="25.6866, -100.3161" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_MX" />
    <meta property="og:site_name" content="FEI Consultores" />
    <meta property="og:title" content="Expedientes de Materialidad Fiscal listos para auditoría | FEI Consultores" />
    <meta property="og:description" content="Construimos, organizamos y validamos expedientes de materialidad fiscal que sustentan tus operaciones ante revisiones fiscales. +50 documentos estructurados por operación." />
    <meta property="og:url" content="https://feiconsultores.com/" />
    <meta property="og:image" content="https://feiconsultores.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Expedientes de Materialidad Fiscal listos para auditoría | FEI Consultores" />
    <meta name="twitter:description" content="Expedientes de materialidad fiscal: +50 documentos estructurados por operación, preparados para revisión." />
    <meta name="twitter:image" content="https://feiconsultores.com/og-image.jpg" />

    <!-- Structured data (Organization/LocalBusiness + WebSite) is injected by
         <SiteJsonLd> from config/brand + config/seo so it stays domain-centralized
         and free of absolute-claim copy; baked in at pre-render. -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter (headings, same as Payana) + Hanken Grotesk (body) — free Apercu-style grotesque -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/logo.png" />
  </head>
  <body class="min-h-screen bg-background font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
