name: Deploy visual preview to GitHub Pages

# Static, frontend-only preview of the redesign. The Express backend (CMS, forms,
# admin, blog API) does NOT run on GitHub Pages — for a full functional review,
# deploy to a Node host (Replit/Render).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: Install Chromium (for pre-render)
        run: npx playwright install --with-deps chromium
      - name: Generate sitemap.xml (lastmod + domain)
        run: node scripts/gen-sitemap.mjs
      - name: Build client (subpath base)
        run: npx vite build --base=/REDISENO-FEI-WEB-V2/
      - name: Pre-render routes (SSG — real HTML per page)
        run: node scripts/prerender.mjs
        env:
          PRERENDER_BASE: /REDISENO-FEI-WEB-V2/
      - name: SPA fallback (serve index.html on unknown routes)
        run: cp dist/public/index.html dist/public/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
